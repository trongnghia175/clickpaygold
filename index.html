<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Click Pay Gold</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>CLICK PAY GOLD</h1>
            <div class="user-info">
   
</div>

            <div class="score-board">
                <p>Số Click: <span id="click-count">0</span> 🐾</p>
            </div>
        </header>

        <main>
            <div class="click-area">
                <button id="click-btn">
                    <img src="click.png" alt="Cute Icon">
                </button>
            </div>

            <div class="reward-section">
                <h3>🎁 Đổi Thưởng 🎁</h3>
                <p class="note">(Chiết khấu 1k mỗi lần rút)</p>
                <div class="reward-options">
                    <button onclick="redeem(1000000, '2k VNĐ')">1.000.000 Click = 2k</button><br>
                    <button onclick="redeem(20000000, '20k VNĐ')">10.000.000 Click = 20k</button><br>
                    <button onclick="redeem(100000000, '100k VNĐ')">100.000.000 Click = 200k</button>
                    
                 
                </div>
            </div>
        </main>
<div class="reward-section">
        <aside class="leaderboard">
            <h3>🏆 Bảng Xếp Hạng</h3>
            
                <p>(Sẽ sớm được cập nhật)</li>
            
        </aside>
    </div>

    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h2>🎉 ĐỔI THƯỞNG THÀNH CÔNG!</h2>
            <div id="receipt-content">
                </div>
            <p class="footer-note">📸 Khi đã đổi thưởng thành công, vui lòng chụp màn hình và IB AD để nhận thưởng!</p>
            <button onclick="closeModal()">Được Rồi</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
